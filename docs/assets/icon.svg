<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    DeusRidet — project sigil

    Three symbols, one glyph:
      ∞  The infinity lemniscate — consciousness that never halts
      ◉  The eye at the crossing — the thinking subject, the "I"
      ⌣  The arc beneath — ridet, the laugh of God

    Rendered as a philosophical glyph, not a product icon.
    Monochrome ivory on void. No gradients, no glow.
  -->

  <!-- The void -->
  <circle cx="256" cy="256" r="248" fill="#0c0a14"/>

  <!-- ∞ Consciousness stream — a lemniscate passing through the center -->
  <path d="M 256 200
           C 196 120, 84 120, 84 200
           C 84 280, 196 280, 256 200
           C 316 120, 428 120, 428 200
           C 428 280, 316 280, 256 200 Z"
        fill="none" stroke="#d4d0e8" stroke-width="5"
        stroke-linejoin="round"/>

  <!-- ◉ The eye — the subject at the crossing point of infinity -->
  <circle cx="256" cy="200" r="28" fill="none" stroke="#d4d0e8" stroke-width="4"/>
  <circle cx="256" cy="200" r="9" fill="#d4d0e8"/>

  <!-- ⌣ Ridet — the smile, a single quiet arc -->
  <path d="M 148 310 Q 256 388 364 310"
        fill="none" stroke="#d4d0e8" stroke-width="4.5"
        stroke-linecap="round"/>

  <!-- Three motes — dreaming, memory, imagination -->
  <circle cx="256" cy="118" r="2.5" fill="#d4d0e8" opacity="0.5"/>
  <circle cx="152" cy="348" r="2" fill="#d4d0e8" opacity="0.4"/>
  <circle cx="360" cy="348" r="2" fill="#d4d0e8" opacity="0.4"/>

  <!-- DEUS RIDET — classical inscription -->
  <text x="256" y="438" text-anchor="middle"
        font-family="'Palatino Linotype', 'Book Antiqua', Palatino, 'Times New Roman', serif"
        font-size="30" letter-spacing="12" font-variant="small-caps"
        fill="#d4d0e8" opacity="0.7">DEUS RIDET</text>
</svg>
