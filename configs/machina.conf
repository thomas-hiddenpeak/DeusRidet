# machina.conf — DeusRidet Engine Configuration
#
# Format: key=value (one per line, # = comment)
# All paths should be absolute. CLI arguments override these values.

# ============================================================================
# Model Paths
# ============================================================================
llm_model_dir = /home/rm01/models/dev/llm/Qwen3.5-9B
asr_model_dir = /home/rm01/models/dev/asr/Qwen/Qwen3-ASR-1.7B
tts_model_dir = /home/rm01/models/dev/tts/Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice

# ============================================================================
# Memory Budget (9B BF16: ~18 GB weights + ~4.7 GB ASR + ~3.5 GB overhead)
# Available for KV/scratch: ~37 GB on 64 GB Orin
# ============================================================================
kv_cache_gb    = 10.0
ssm_conv_gb    = 3.0
scratch_gb     = 6.0

# ============================================================================
# Inference Parameters
# ============================================================================
max_chunk_size = 2048
max_ssm_slots  = 64

# ============================================================================
# MTP Speculative Decoding
# ============================================================================
mtp_enabled    = true
mtp_num_drafts = 1

# ============================================================================
# SSD Prefix Cache
# ============================================================================
cache_enabled    = true
cache_dir        = /tmp/deusridet_cache
cache_max_gb     = 20.0
cache_chunk_size = 256
