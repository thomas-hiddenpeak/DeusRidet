# auditus.conf — DeusRidet Auditus (speaker diarization) runtime knobs
#
# Format: key=value (one per line, # = comment)
# Loaded by `awaken` just before AudioPipeline::start(). All keys are
# optional — omitted keys fall back to the AudioPipelineConfig defaults
# compiled into audio_pipeline.h. Editing this file requires ONLY a
# process restart (no rebuild).
#
# Philosophical role:
#   Knowing WHEN WHO is speaking is the foundational signal for a
#   conscious agent. This file is the operator's panel for tuning that
#   signal — separated from code so iteration on thresholds does not
#   pollute git history with mechanical parameter sweeps.

# ============================================================================
# Match / Register thresholds (the two primary decision gates)
# ============================================================================
# Cosine similarity threshold for matching a query embedding to an existing
# speaker in the 384D dual-encoder DB (CAM++ 192D || WL-ECAPA 192D).
# Lower -> more matches (more merges). Higher -> more unknowns.
speaker_threshold = 0.50

# Cosine similarity threshold for confirming a new speaker from the
# pending pool (a query must pair with a prior pending query at this
# similarity to be accepted as a new identity). Lower -> faster cold-start
# registration, more false splits. Higher -> slower cold-start, fewer
# false splits.
speaker_register_threshold = 0.60

# ============================================================================
# Discovery phase (cold-start separation)
# ============================================================================
# Number of end-of-segment FULL extractions treated as "discovery".
# During this window, match_thresh is boosted to force new speakers
# apart instead of absorbing similar voices into spk0. Recency gating
# is also disabled during this window (see below).
speaker_discovery_count = 50

# Additive boost applied to match_thresh during discovery. 0.07 means
# a discovery-phase match requires sim >= 0.52 (instead of 0.45).
speaker_discovery_boost = 0.07

# ============================================================================
# Recency stabilizer (post-discovery only)
# ============================================================================
# Time window (in source-audio seconds) during which the previously
# identified speaker is considered "still active"; within this window
# match_thresh is lowered by recency_bonus and auto_reg is disabled.
speaker_recency_window_sec = 15.0

# Amount match_thresh is lowered by when recency is active. Too large
# -> false merges across speaker boundaries; too small -> useless.
speaker_recency_bonus = 0.05

# ============================================================================
# Ambiguity / safety gates
# ============================================================================
# Minimum margin (top-1 sim - top-2 sim) required to trust a match.
# Below this, the pipeline abstains (emits unidentified). 0.05 tested
# best on test.mp3. Raise to be stricter, lower to be more confident.
speaker_margin_abstain = 0.05

# After this many FULL extractions, auto-register is disabled
# globally — drift-clones observed historically at count >= 180.
speaker_max_auto_reg_count = 1000

# ============================================================================
# Segment-length gate
# ============================================================================
# Minimum accumulated fbank frames (10 ms hop) before CAM++ FULL
# extraction runs on a closed speech segment. Segments shorter than
# this are dropped entirely: no embedding, no identity, no registration.
# Default 150 (~1.5 s) matches the long-standing hardcoded value.
# Lowering this (e.g. to 50) was tested in Step 4b and REGRESSED
# macro accuracy on a 4-speaker 600 s capture from 0.281 to 0.200:
# short-segment embeddings are noisier and the runtime EMA-updates
# cluster centroids on every decided hit, so flooding the library
# with short-segment rescues polluted existing centroids enough that
# two legitimate newcomers never crossed speaker_register_threshold.
# Keep at 150 unless you also redesign the library-update policy
# (e.g. weight short-segment contributions less, or gate registration
# on per-segment confidence rather than a single similarity pass).
speaker_min_fbank_frames = 150
